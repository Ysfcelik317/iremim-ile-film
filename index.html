<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İREMİM İLE FİLM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* ===== GİRİŞ EKRANI ===== */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            background: #0f0f0f;
        }
        
        .logo {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 50px;
            font-size: 16px;
        }
        
        .input-group {
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            outline: none;
            border: 1px solid #333;
        }
        
        input::placeholder {
            color: #666;
        }
        
        .btn {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        /* ===== ANA EKRAN ===== */
        .home-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            background: #0f0f0f;
        }
        
        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }
        
        .start-party-btn {
            background: #4CAF50;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .join-btn {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .platform-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #333;
            aspect-ratio: 1;
        }
        
        .platform-card:active {
            transform: scale(0.95);
        }
        
        .platform-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .youtube { background: #FF0000; }
        .browser { background: #00D4FF; }
        
        .platform-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        
        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .modal-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0f0f0f;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .modal-btn-primary {
            background: #e94560;
            color: #fff;
        }
        
        .modal-btn-secondary {
            background: #333;
            color: #fff;
        }
        
        /* ===== İZLEME EKRANI ===== */
        .watch-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #000;
        }
        
        .watch-header {
            padding: 12px 15px;
            background: #0f0f0f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        
        .room-info {
            font-size: 14px;
            color: #888;
        }
        
        .room-code {
            font-weight: bold;
            color: #e94560;
            font-size: 18px;
        }
        
        .voice-btn-header {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .voice-btn-header.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .chat-toggle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /* ===== VİDEO BÖLÜMÜ ===== */
        .video-section {
            padding: 15px;
            background: #0f0f0f;
        }
        
        .video-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .video-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        
        .load-btn {
            padding: 12px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }
        
        .video-container.active {
            display: block;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            margin-top: 10px;
        }
        
        .video-placeholder-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        /* ===== KONTROLLER ===== */
        .controls-bar {
            padding: 15px;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            border-top: 1px solid #222;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #1a1a1a;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #333;
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        /* ===== SOHBET PANELİ ===== */
        .chat-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: #1a1a1a;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
        
        .chat-panel.open {
            transform: translateY(0);
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 10px;
            background: #0f0f0f;
            border-radius: 12px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-user {
            font-size: 12px;
            color: #e94560;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        
        .chat-input {
            flex: 1;
            background: #0f0f0f;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* ===== SESLİ SOHBET OVERLAY ===== */
        .voice-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
        }
        
        .voice-overlay.active {
            display: flex;
        }
        
        .voice-animation {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            animation: voicePulse 1.5s infinite;
        }
        
        @keyframes voicePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .voice-text {
            margin-top: 20px;
            font-size: 18px;
            color: #fff;
        }
        
        .voice-close-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- ===== GİRİŞ EKRANI ===== -->
    <div class="login-screen" id="loginScreen">
        <div class="logo">🎬 İREMİM İLE FİLM</div>
        <div class="subtitle">HAYDİ GEL GÜLÜMM</div>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="Adınız" maxlength="20">
        </div>
        
        <button class="btn" onclick="goToHome()">Devam Et</button>
    </div>
    
    <!-- ===== ANA EKRAN ===== -->
    <div class="home-screen" id="homeScreen">
        <div class="home-header">
            <button class="start-party-btn" onclick="createRoom()">
                📹 Start Party
            </button>
            <button class="join-btn" onclick="showJoinModal()">
                🔗 Join
            </button>
        </div>
        
        <div class="section-title">Start Watching</div>
        
        <div class="platforms-grid">
            <div class="platform-card" onclick="setPlatform('youtube')">
                <div class="platform-icon youtube">▶️</div>
                <div class="platform-name">YouTube</div>
            </div>
            
            <div class="platform-card" onclick="setPlatform('browser')">
                <div class="platform-icon browser">🌐</div>
                <div class="platform-name">Tarayıcı</div>
            </div>
        </div>
    </div>
    
    <!-- ===== JOIN MODAL ===== -->
    <div class="modal-overlay" id="joinModal">
        <div class="modal">
            <div class="modal-title">Odaya Katıl</div>
            <input type="text" class="modal-input" id="joinCode" placeholder="ODA KODU" maxlength="6">
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="hideJoinModal()">İptal</button>
                <button class="modal-btn modal-btn-primary" onclick="joinRoom()">Katıl</button>
            </div>
        </div>
    </div>
    
    <!-- ===== İZLEME EKRANI ===== -->
    <div class="watch-screen" id="watchScreen">
        <div class="watch-header">
            <div class="room-info">
                Oda: <span class="room-code" id="displayRoomCode">---</span>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="voice-btn-header" id="voiceBtn" onclick="toggleVoice()">
                    🎤 Sesli Sohbet
                </button>
                <button class="chat-toggle-btn" onclick="toggleChat()">💬</button>
            </div>
        </div>
        
        <div class="video-section">
            <div class="video-input-group">
                <input type="text" class="video-input" id="videoUrl" placeholder="YouTube linki yapıştırın...">
                <button class="load-btn" onclick="loadVideo()">Yükle</button>
            </div>
            
            <div class="video-placeholder" id="videoPlaceholder">
                <div class="video-placeholder-icon">🎬</div>
                <div>Video yüklemek için link yapıştırın</div>
            </div>
            
            <div class="video-container" id="videoContainer">
                <iframe id="youtubePlayer" allowfullscreen></iframe>
            </div>
        </div>
        
        <div class="controls-bar">
            <button class="control-btn" onclick="syncPlay()">▶️</button>
            <button class="control-btn" onclick="syncPause()">⏸️</button>
            <button class="control-btn" onclick="shareRoom()">🔗</button>
        </div>
    </div>
    
    <!-- ===== SESLİ SOHBET OVERLAY ===== -->
    <div class="voice-overlay" id="voiceOverlay">
        <div class="voice-animation">🎤</div>
        <div class="voice-text">Sesli Sohbet Aktif</div>
        <button class="voice-close-btn" onclick="toggleVoice()">Kapat</button>
    </div>
    
    <!-- ===== SOHBET PANELİ ===== -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <span style="font-weight:bold;">Sohbet</span>
            <button onclick="toggleChat()" style="background:none;border:none;color:#fff;font-size:20px;">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // ===== JSONBin.io AYARLARI =====
        const JSONBIN_API_KEY = '$2a$10$z8ZRX5QlmQ6q.mlba7AHGu4MDzY334o719WjrCgNy4qyLB54pvnS.';
        const JSONBIN_BASE_URL = 'https://api.jsonbin.io/v3/b';
        let currentBinId = null;
        
        // Global Değişkenler
        let currentUser = '';
        let currentRoom = '';
        let isVoiceActive = false;
        let chatOpen = false;
        let isHost = false;
        let currentVideoId = '';
        let pollInterval = null;
        
        // Rastgele Oda Kodu
        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        
        // YouTube ID Çıkar
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        // Girişten Ana Ekrana
        function goToHome() {
            const name = document.getElementById('userName').value.trim();
            if (!name) {
                alert('Lütfen adınızı girin!');
                return;
            }
            currentUser = name;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('homeScreen').style.display = 'flex';
        }
        
        // Platform Seçimi
        function setPlatform(platform) {
            currentRoom = generateRoomCode();
            isHost = true;
            openWatchScreen();
        }
        
        // Oda Oluştur
        function createRoom() {
            currentRoom = generateRoomCode();
            isHost = true;
            openWatchScreen();
        }
        
        // Modal
        function showJoinModal() {
            document.getElementById('joinModal').classList.add('active');
        }
        
        function hideJoinModal() {
            document.getElementById('joinModal').classList.remove('active');
        }
        
        // Odaya Katıl
        function joinRoom() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (!code || code.length !== 6) {
                alert('Lütfen geçerli 6 haneli oda kodu girin!');
                return;
            }
            currentRoom = code;
            isHost = false;
            hideJoinModal();
            openWatchScreen();
        }
        
        // İzleme Ekranını Aç
        function openWatchScreen() {
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('watchScreen').style.display = 'flex';
            document.getElementById('displayRoomCode').textContent = currentRoom;
            
            // JSONBin oluştur veya bağlan
            if (isHost) {
                createRoomBin();
            } else {
                joinRoomBin();
            }
            
            addMessage('Sistem', `Oda: ${currentRoom}`);
            addMessage('Sistem', 'YouTube linki yapıştırın ve "Yükle" basın.');
        }
        
        // ===== JSONBin ODA OLUŞTUR =====
        async function createRoomBin() {
            try {
                const response = await fetch(JSONBIN_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY,
                        'X-Bin-Private': 'false'
                    },
                    body: JSON.stringify({
                        roomCode: currentRoom,
                        createdBy: currentUser,
                        createdAt: Date.now(),
                        videoId: '',
                        videoUrl: '',
                        messages: [
                            { user: 'Sistem', text: 'Oda oluşturuldu!', time: Date.now() }
                        ],
                        users: [currentUser]
                    })
                });
                
                const data = await response.json();
                currentBinId = data.metadata.id;
                
                // Polling başlat
                startPolling();
                
                addMessage('Sistem', 'Oda oluşturuldu! Arkadaşınıza kodu gönderin.');
            } catch (error) {
                console.error('Oda oluşturma hatası:', error);
                addMessage('Sistem', 'Oda oluşturulamadı. Çevrimdışı mod.');
            }
        }
        
        // ===== JSONBin ODAYA KATIL =====
        async function joinRoomBin() {
            // Tüm bin'leri ara (JSONBin'de direkt arama yok, bu yüzden basitleştirilmiş)
            addMessage('Sistem', 'Odaya bağlanılıyor...');
            
            // Şimdilik basit bir yaklaşım: Kullanıcı manuel senkronize olacak
            // Gerçek zamanlı için WebSocket gerekli
            
            addMessage('Sistem', 'Bağlandı! YouTube linkini yapıştırın.');
        }
        
        // ===== POLLING (Basit Senkronizasyon) =====
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            
            pollInterval = setInterval(async () => {
                if (!currentBinId) return;
                
                try {
                    const response = await fetch(`${JSONBIN_BASE_URL}/${currentBinId}/latest`, {
                        headers: { 'X-Master-Key': JSONBIN_API_KEY }
                    });
                    
                    const data = await response.json();
                    const room = data.record;
                    
                    // Yeni mesajları kontrol et
                    if (room.messages && room.messages.length > 0) {
                        const lastMsg = room.messages[room.messages.length - 1];
                        // Burada yeni mesajları gösterebiliriz
                    }
                    
                    // Video durumunu kontrol et
                    if (room.videoId && room.videoId !== currentVideoId) {
                        if (!isHost) {
                            loadYouTubeVideo(room.videoId);
                        }
                    }
                } catch (error) {
                    console.log('Polling hatası:', error);
                }
            }, 3000); // Her 3 saniyede bir kontrol
        }
        
        // ===== VERİ GÜNCELLE =====
        async function updateRoomData(data) {
            if (!currentBinId) return;
            
            try {
                await fetch(`${JSONBIN_BASE_URL}/${currentBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });
            } catch (error) {
                console.error('Güncelleme hatası:', error);
            }
        }
        
        // Video Yükle
        function loadVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const videoId = extractYouTubeId(url);
            
            if (!videoId) {
                alert('Geçerli bir YouTube linki girin!\nÖrnek: https://www.youtube.com/watch?v=VIDEO_ID');
                return;
            }
            
            loadYouTubeVideo(videoId);
            currentVideoId = videoId;
            
            // JSONBin'e kaydet
            if (currentBinId) {
                updateRoomData({
                    roomCode: currentRoom,
                    videoId: videoId,
                    videoUrl: url,
                    updatedBy: currentUser,
                    updatedAt: Date.now()
                });
            }
        }
        
        function loadYouTubeVideo(videoId) {
            const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=0`;
            
            document.getElementById('videoPlaceholder').style.display = 'none';
            document.getElementById('videoContainer').classList.add('active');
            document.getElementById('youtubePlayer').src = embedUrl;
            
            addMessage('Sistem', '🎬 Video yüklendi!');
        }
        
        // Senkronizasyon
        function syncPlay() {
            addMessage('Sistem', '▶️ Oynatma senkronize edildi');
            if (currentBinId) {
                updateRoomData({ action: 'play', time: Date.now() });
            }
        }
        
        function syncPause() {
            addMessage('Sistem', '⏸️ Duraklatma senkronize edildi');
            if (currentBinId) {
                updateRoomData({ action: 'pause', time: Date.now() });
            }
        }
        
        // Sesli Sohbet
        function toggleVoice() {
            isVoiceActive = !isVoiceActive;
            const btn = document.getElementById('voiceBtn');
            const overlay = document.getElementById('voiceOverlay');
            
            if (isVoiceActive) {
                btn.classList.add('active');
                overlay.classList.add('active');
                addMessage('Sistem', '🎤 Sesli sohbet aktif');
            } else {
                btn.classList.remove('active');
                overlay.classList.remove('active');
                addMessage('Sistem', '🎤 Sesli sohbet kapalı');
            }
        }
        
        // Sohbet Paneli
        function toggleChat() {
            chatOpen = !chatOpen;
            document.getElementById('chatPanel').classList.toggle('open', chatOpen);
        }
        
        // Mesaj Gönder
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(currentUser, text);
            input.value = '';
            
            // JSONBin'e kaydet
            if (currentBinId) {
                try {
                    const response = await fetch(`${JSONBIN_BASE_URL}/${currentBinId}/latest`, {
                        headers: { 'X-Master-Key': JSONBIN_API_KEY }
                    });
                    const data = await response.json();
                    const room = data.record;
                    
                    room.messages.push({
                        user: currentUser,
                        text: text,
                        time: Date.now()
                    });
                    
                    await updateRoomData(room);
                } catch (error) {
                    console.error('Mesaj kaydetme hatası:', error);
                }
            }
        }
        
        // Mesaj Ekle
        function addMessage(user, text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<div class="message-user">${user}</div><div>${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // Oda Kodunu Paylaş
        function shareRoom() {
            const text = `İREMİM İLE FİLM oda kodum: ${currentRoom}`;
            if (navigator.share) {
                navigator.share({ title: 'İREMİM İLE FİLM', text: text });
            } else {
                alert(text);
            }
        }
    </script>
</body>
</html>
